name: Deploy Vite App

on:
  push:
    branches: [ "main", "gh-pages" ] # Gatilho para ambas as branches por segurança
  workflow_dispatch: # Permite rodar o deploy manualmente se precisar

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    # Define o ambiente para o GitHub criar o link oficial do site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
